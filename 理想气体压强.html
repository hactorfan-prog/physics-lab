<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理想气体定律模拟 - 压强与温度关系</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        #simulationCanvas {
            border: 2px solid #333;
            background-color: #000;
            flex: 1;
            min-width: 400px;
            height: 600px;
        }
        .controls {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 300px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .results {
            background-color: #e3f2fd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .result-item {
            margin: 10px 0;
            padding: 8px;
            background-color: rgba(255,255,255,0.7);
            border-radius: 4px;
        }
        .result-label {
            font-weight: bold;
            color: #1565c0;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1976d2;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        h1 {
            color: #1565c0;
            margin-bottom: 20px;
        }
        h2 {
            color: #1565c0;
            margin-top: 0;
            font-size: 1.3em;
        }
        .physics-law {
            margin-top: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 1200px;
        }
        .formula {
            font-family: 'Times New Roman', serif;
            font-size: 1.2em;
            color: #d32f2f;
            text-align: center;
            margin: 10px 0;
        }
        .density-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .density-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            background-color: #e3f2fd;
            border: 2px solid #bbdefb;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .density-btn.active {
            background-color: #2196f3;
            color: white;
            border-color: #1976d2;
        }
        .density-btn:hover {
            background-color: #bbdefb;
        }
    </style>
</head>
<body>
    <h1>理想气体压强与温度变化现象仿真</h1>
    <div class="author">作者：xatu_bai</div>
    <div class="container">
        <canvas id="simulationCanvas"></canvas>
        <div class="controls">
            <h2>控制参数</h2>
            
            <div class="control-group">
                <label for="temperature">气体温度: <span id="tempValue">300</span> K</label>
                <input type="range" id="temperature" min="100" max="1000" value="300">
            </div>
            
            <div class="control-group">
                <label>分子数密度:</label>
                <div class="density-buttons">
                    <div class="density-btn" data-density="low">低密度</div>
                    <div class="density-btn active" data-density="medium">中密度</div>
                    <div class="density-btn" data-density="high">高密度</div>
                </div>
            </div>
            
            <div class="control-buttons">
                <button id="startBtn">开始</button>
                <button id="pauseBtn">暂停</button>
                <button id="resetBtn">重置</button>
            </div>
            
            <div class="results">
                <h2>物理量计算</h2>
                <div class="result-item">
                    <span class="result-label">分子平均平动动能:</span> <span id="avgKineticEnergy">0</span> J
                </div>
                <div class="result-item">
                    <span class="result-label">分子数密度:</span> <span id="numberDensity">0</span> 分子/m²
                </div>
                <div class="result-item">
                    <span class="result-label">气体压强:</span> <span id="pressure">0</span> Pa
                </div>
            </div>
        </div>
    </div>
    
    <div class="physics-law">
        <h2>理想气体定律验证</h2>
        <p>根据分子动理论，理想气体的压强与分子平均平动动能和分子数密度的关系为：</p>
        <div class="formula">P = (2/3) * n * εₖ</div>
        <p>其中：P为气体压强，n为分子数密度，εₖ为分子平均平动动能</p>
        <p>温度与分子平均平动动能的关系：εₖ = (3/2) * k * T，其中k为玻尔兹曼常数(1.38×10⁻²³ J/K)，T为热力学温度</p>
    </div>

    <script>
        // 获取Canvas和上下文
        const canvas = document.getElementById('simulationCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置Canvas尺寸
        canvas.width = 600;
        canvas.height = 600;
        
        // 物理常数
        const BOLTZMANN_CONSTANT = 1.38e-23; // 玻尔兹曼常数，单位J/K
        const SCALE_FACTOR = 1e10; // 缩放因子，将实际物理量转换为画布上的显示值
        
        // 分子数组和参数
        let molecules = [];
        let moleculeCount = 2000; // 默认中密度
        let temperature = 300; // 初始温度，单位K
        let isRunning = true;
        let animationId = null;
        
        // 密度档位对应的分子数量
        const densitySettings = {
            'low': 1000,
            'medium': 2000,
            'high': 3000
        };
        
        // 分子类
        class Molecule {
            constructor(x, y) {
                this.radius = 2; // 减小分子半径以适应高密度
                this.x = x;
                this.y = y;
                
                // 根据温度计算速度（温度越高，速度越大）
                // 动能与温度关系：(1/2)mv² = (3/2)kT，这里简化质量为1
                const kineticEnergy = 1.5 * BOLTZMANN_CONSTANT * temperature;
                const speed = Math.sqrt(2 * kineticEnergy) * SCALE_FACTOR;
                
                // 随机方向
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                // 统一设置为蓝色
                this.color = '#2196f3';
            }
            
            update() {
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 与容器壁碰撞（完全弹性碰撞）
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx = -this.vx;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }
                if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                    this.vy = -this.vy;
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                }
            }
            
            draw() {
                // 绘制分子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            
            // 获取分子动能（简化质量为1）
            getKineticEnergy() {
                const actualVx = this.vx / SCALE_FACTOR;
                const actualVy = this.vy / SCALE_FACTOR;
                return 0.5 * (actualVx * actualVx + actualVy * actualVy);
            }
            
            checkCollision(other) {
                const dx = other.x - this.x;
                const dy = other.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < this.radius + other.radius) {
                    // 计算碰撞后的速度（弹性碰撞）
                    const nx = dx / distance;
                    const ny = dy / distance;
                    
                    const tx = -ny;
                    const ty = nx;
                    
                    // 投影速度到法向和切向
                    const v1n = this.vx * nx + this.vy * ny;
                    const v1t = this.vx * tx + this.vy * ty;
                    const v2n = other.vx * nx + other.vy * ny;
                    const v2t = other.vx * tx + other.vy * ty;
                    
                    // 交换法向速度（质量相同）
                    this.vx = v2n * nx + v1t * tx;
                    this.vy = v2n * ny + v1t * ty;
                    other.vx = v1n * nx + v2t * tx;
                    other.vy = v1n * ny + v2t * ty;
                    
                    // 分离分子防止重叠
                    const overlap = 0.5 * (this.radius + other.radius - distance + 1);
                    this.x -= overlap * nx;
                    this.y -= overlap * ny;
                    other.x += overlap * nx;
                    other.y += overlap * ny;
                }
            }
        }
        
        // 初始化分子
        function initMolecules() {
            molecules = [];
            const containerWidth = canvas.width;
            const containerHeight = canvas.height;
            
            // 使用网格布局确保分子均匀分布
            const gridSize = Math.ceil(Math.sqrt(moleculeCount));
            const cellWidth = containerWidth / gridSize;
            const cellHeight = containerHeight / gridSize;
            
            for (let i = 0; i < moleculeCount; i++) {
                const col = i % gridSize;
                const row = Math.floor(i / gridSize);
                
                // 在网格单元内随机位置
                const x = col * cellWidth + Math.random() * cellWidth;
                const y = row * cellHeight + Math.random() * cellHeight;
                
                molecules.push(new Molecule(x, y));
            }
            updatePhysicsValues();
        }
        
        // 计算并更新物理量
        function updatePhysicsValues() {
            if (molecules.length === 0) return;
            
            // 计算平均平动动能
            let totalKineticEnergy = 0;
            molecules.forEach(mol => {
                totalKineticEnergy += mol.getKineticEnergy();
            });
            const avgKineticEnergy = totalKineticEnergy / molecules.length;
            
            // 计算分子数密度（分子数/面积，转换为实际单位 m⁻²）
            // 假设画布1px = 1e-6米（实际尺寸缩放）
            const canvasArea = (canvas.width * 1e-6) * (canvas.height * 1e-6); // 平方米
            const numberDensity = moleculeCount / canvasArea;
            
            // 计算压强 P = (2/3) * n * εₖ
            const pressure = (2/3) * numberDensity * avgKineticEnergy;
            
            // 更新显示
            document.getElementById('avgKineticEnergy').textContent = avgKineticEnergy.toExponential(2);
            document.getElementById('numberDensity').textContent = numberDensity.toExponential(2);
            document.getElementById('pressure').textContent = pressure.toExponential(2);
        }
        
        // 动画循环
        function animate() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制容器边框
            ctx.strokeStyle = '#4deeea';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            // 更新所有分子
            molecules.forEach(mol => mol.update());
            
            // 检测碰撞 - 使用随机采样以提高性能
            const collisionCheckCount = Math.min(moleculeCount, 1000);
            
            for (let i = 0; i < collisionCheckCount; i++) {
                const index1 = Math.floor(Math.random() * molecules.length);
                const index2 = Math.floor(Math.random() * molecules.length);
                
                if (index1 === index2) continue;
                
                molecules[index1].checkCollision(molecules[index2]);
            }
            
            // 绘制所有分子
            molecules.forEach(mol => mol.draw());
            
            // 每30帧更新一次物理量计算（提高性能）
            if (Math.random() < 1/30) {
                updatePhysicsValues();
            }
            
            // 继续动画循环
            if (isRunning) {
                animationId = requestAnimationFrame(animate);
            }
        }
        
        // 事件监听
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                animate();
            }
        });
        
        document.getElementById('pauseBtn').addEventListener('click', () => {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            initMolecules();
            isRunning = true;
            animate();
        });
        
        document.getElementById('temperature').addEventListener('input', (e) => {
            temperature = parseInt(e.target.value);
            document.getElementById('tempValue').textContent = temperature;
            
            // 根据新温度调整分子速度
            molecules.forEach(mol => {
                // 保持方向不变，调整速度大小以匹配新温度
                const currentSpeed = Math.sqrt(mol.vx * mol.vx + mol.vy * mol.vy);
                if (currentSpeed > 0) {
                    const kineticEnergy = 1.5 * BOLTZMANN_CONSTANT * temperature;
                    const newSpeed = Math.sqrt(2 * kineticEnergy) * SCALE_FACTOR;
                    const ratio = newSpeed / currentSpeed;
                    mol.vx *= ratio;
                    mol.vy *= ratio;
                }
            });
            updatePhysicsValues();
        });
        
        // 分子数密度按钮事件
        const densityButtons = document.querySelectorAll('.density-btn');
        densityButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // 移除所有按钮的active类
                densityButtons.forEach(b => b.classList.remove('active'));
                // 给当前按钮添加active类
                btn.classList.add('active');
                
                // 更新分子数量
                const density = btn.getAttribute('data-density');
                moleculeCount = densitySettings[density];
                
                // 重新初始化分子
                initMolecules();
            });
        });
        
        // 初始化并启动
        initMolecules();
        animate();
    </script>
</body>
</html>

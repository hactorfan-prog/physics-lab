<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热力学第一定律（等值问题）虚拟仿真实验</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .formula {
            font-size: 24px;
            padding: 15px;
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 100%);
            border-radius: 10px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .main-content {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .simulation-section {
            flex: 1.5;
            display: flex;
            flex-direction: column;
        }
        .canvas-container {
            position: relative;
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .controls-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .gas-info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.95);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
            font-weight: bold;
        }
        .panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .panel h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
        }
        .process-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        button.active {
            background: #2c3e50;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .slider-group {
            margin: 15px 0;
        }
        .slider-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            transition: background 0.3s;
        }
        input[type="range"]:disabled {
            background: #e9ecef;
        }
        .slider-value {
            float: right;
            font-weight: normal;
            color: #e74c3c;
        }
        .data-display {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            padding: 20px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .data-label {
            font-weight: bold;
            color: #2c3e50;
        }
        .data-value {
            font-weight: bold;
            color: #e74c3c;
        }
        .data-formula {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 3px;
        }
        .process-info {
            font-style: italic;
            color: #7f8c8d;
            text-align: center;
            margin-top: 10px;
        }
        .energy-display {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .energy-card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .energy-title {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .energy-value {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
            text-align: center;
        }
        .energy-formula {
            font-size: 0.85em;
            color: #7f8c8d;
            text-align: center;
            margin-top: 5px;
        }
        .disabled-label {
            color: #95a5a6 !important;
        }
        .energy-panel {
            margin-left: 20px;
            flex: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>热力学第一定律的等值过程现象仿真</h1>
             <div class="author">作者：xatu_bai</div>
            <div class="formula">Q = ΔE+W</div>
        </div>
        
        <div class="main-content">
            <div class="simulation-section">
                <div class="canvas-container">
                    <div class="gas-info">单原子分子理想气体 · 1 mol</div>
                    <div id="p5-canvas"></div>
                </div>
            </div>
            
            <div class="energy-panel">
                <div class="panel">
                    <h2>能量分析</h2>
                    <div class="energy-display">
                        <div class="energy-card">
                            <div class="energy-title">热量 (Q)</div>
                            <div class="energy-value" id="q-value">0 J</div>
                            <div class="energy-formula">Q = ΔE + W</div>
                        </div>
                        <div class="energy-card">
                            <div class="energy-title">功 (W)</div>
                            <div class="energy-value" id="w-value">0 J</div>
                            <div class="energy-formula">W = PΔV</div>
                        </div>
                        <div class="energy-card">
                            <div class="energy-title">内能变化 (ΔE)</div>
                            <div class="energy-value" id="e-value">0 J</div>
                            <div class="energy-formula">ΔE = nC<sub>v</sub>ΔT</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="controls-section">
                <div class="panel">
                    <h2>过程控制</h2>
                    <div class="process-buttons">
                        <button id="isochoric" class="active">等容过程</button>
                        <button id="isobaric">等压过程</button>
                        <button id="isothermal">等温过程</button>
                        <button id="adiabatic">绝热过程</button>
                    </div>
                    <div class="process-info" id="process-info">等容过程 - 体积不变</div>
                </div>
                
                <div class="panel">
                    <h2>参数调节</h2>
                    <div class="slider-group">
                        <label id="volume-label">体积 (V): <span class="slider-value" id="volume-value">1.0 L</span></label>
                        <input type="range" id="volume-slider" min="0.5" max="2.0" step="0.1" value="1.0">
                    </div>
                    
                    <div class="slider-group">
                        <label id="pressure-label">压强 (P): <span class="slider-value" id="pressure-value">100 kPa</span></label>
                        <input type="range" id="pressure-slider" min="50" max="200" step="5" value="100">
                    </div>
                    
                    <div class="slider-group">
                        <label id="temperature-label">温度 (T): <span class="slider-value" id="temperature-value">300 K</span></label>
                        <input type="range" id="temperature-slider" min="200" max="500" step="10" value="300">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 系统初始状态
        let P = 100;  // 压强 (kPa)
        let V = 1.0;  // 体积 (L)
        let T = 300;  // 温度 (K)
        
        // 过程变量
        let Q = 0;    // 热量 (J)
        let W = 0;    // 功 (J)
        let ΔE = 0;   // 内能变化 (J)
        
        // 系统参数
        const n = 1.0;   // 摩尔数 (1 mol)
        const R = 8.314; // 气体常数
        const Cv = 12.5; // 定容热容 (单原子气体)
        
        // 当前过程类型
        let currentProcess = 'isochoric';
        
        // 粒子系统
        let particles = [];
        const particleCount = 160; // 增加粒子数量到160
        
        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                // 粒子在气缸内随机分布
                this.x = random(150, 450);
                this.y = random(150, 450);
                
                // 初始随机速度
                this.vx = random(-2, 2);
                this.vy = random(-2, 2);
                
                // 固定大小
                this.size = 3;
            }
            
            update() {
                // 根据温度调整速度 - 温度越高，速度越快
                const speedFactor = map(T, 200, 500, 0.4, 3.0);
                
                // 更新位置
                this.x += this.vx * speedFactor;
                this.y += this.vy * speedFactor;
                
                // 获取当前活塞位置
                let pistonY = map(V, 0.5, 2.0, 450, 150);
                
                // 边界碰撞检测
                if (this.x < 150 || this.x > 450) {
                    this.vx *= -1;
                    this.x = constrain(this.x, 150, 450);
                }
                
                // 与气缸底部和活塞碰撞
                if (this.y < 150) {
                    this.vy *= -1;
                    this.y = 150;
                }
                
                if (this.y > pistonY - 5) {
                    this.vy *= -1;
                    this.y = pistonY - 5;
                }
            }
            
            display() {
                // 根据温度设置粒子颜色 (蓝色到红色)
                let colorValue = map(T, 200, 500, 0, 255);
                fill(colorValue, 150, 255 - colorValue, 200);
                noStroke();
                ellipse(this.x, this.y, this.size, this.size);
            }
        }
        
        // 初始化P5.js
        function setup() {
            const canvas = createCanvas(600, 600);
            canvas.parent('p5-canvas');
            
            // 创建粒子
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            // 设置事件监听器
            setupEventListeners();
            
            // 初始计算
            updateSystem();
        }
        
        function draw() {
            // 渐变背景
            background(245, 248, 250);
            drawCylinder();
            drawPiston();
            
            // 更新并显示所有粒子
            for (let particle of particles) {
                particle.update();
                particle.display();
            }
        }
        
        function drawCylinder() {
            // 绘制气缸 - 更大的容器
            fill(250, 250, 250);
            stroke(120);
            strokeWeight(3);
            rect(150, 150, 300, 300, 8); // 圆角矩形
            
            // 添加一些细节
            stroke(180);
            strokeWeight(1);
            noFill();
            rect(155, 155, 290, 290, 5);
        }
        
        function drawPiston() {
            // 根据体积计算活塞位置
            let pistonY = map(V, 0.5, 2.0, 450, 150);
            
            // 绘制活塞 - 更真实的设计和颜色
            fill(140, 140, 140);
            stroke(90);
            strokeWeight(2);
            rect(145, pistonY, 310, 18, 5); // 活塞主体
            
            // 绘制活塞杆 - 在活塞下方，更短一些
            fill(120, 120, 120);
            rect(290, pistonY + 18, 20, 25); // 活塞杆
            
            // 活塞杆底部
            fill(100, 100, 100);
            rect(285, pistonY + 43, 30, 6, 3);
        }
        
        function setupEventListeners() {
            // 过程按钮
            document.getElementById('isochoric').addEventListener('click', () => setProcess('isochoric'));
            document.getElementById('isobaric').addEventListener('click', () => setProcess('isobaric'));
            document.getElementById('isothermal').addEventListener('click', () => setProcess('isothermal'));
            document.getElementById('adiabatic').addEventListener('click', () => setProcess('adiabatic'));
            
            // 滑块
            document.getElementById('volume-slider').addEventListener('input', updateFromSlider);
            document.getElementById('pressure-slider').addEventListener('input', updateFromSlider);
            document.getElementById('temperature-slider').addEventListener('input', updateFromSlider);
        }
        
        function setProcess(process) {
            // 更新当前过程
            currentProcess = process;
            
            // 更新按钮状态
            document.querySelectorAll('.process-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(process).classList.add('active');
            
            // 根据过程类型启用/禁用相应的滑块
            updateSliderStates();
            
            // 更新系统
            updateSystem();
        }
        
        function updateSliderStates() {
            // 根据当前过程启用/禁用相应的滑块
            const volumeSlider = document.getElementById('volume-slider');
            const pressureSlider = document.getElementById('pressure-slider');
            const temperatureSlider = document.getElementById('temperature-slider');
            
            const volumeLabel = document.getElementById('volume-label');
            const pressureLabel = document.getElementById('pressure-label');
            const temperatureLabel = document.getElementById('temperature-label');
            
            // 重置所有滑块为可用状态
            volumeSlider.disabled = false;
            pressureSlider.disabled = false;
            temperatureSlider.disabled = false;
            
            // 重置所有标签颜色
            volumeLabel.classList.remove('disabled-label');
            pressureLabel.classList.remove('disabled-label');
            temperatureLabel.classList.remove('disabled-label');
            
            switch(currentProcess) {
                case 'isochoric': // 等容过程 - 体积不变
                    volumeSlider.disabled = true;
                    temperatureSlider.disabled = true;
                    volumeLabel.classList.add('disabled-label');
                    temperatureLabel.classList.add('disabled-label');
                    document.getElementById('process-info').textContent = "等容过程 - 体积不变";
                    break;
                case 'isobaric': // 等压过程 - 压强不变
                    pressureSlider.disabled = true;
                    temperatureSlider.disabled = true;
                    pressureLabel.classList.add('disabled-label');
                    temperatureLabel.classList.add('disabled-label');
                    document.getElementById('process-info').textContent = "等压过程 - 压强不变";
                    break;
                case 'isothermal': // 等温过程 - 温度不变
                    temperatureSlider.disabled = true;
                    pressureSlider.disabled = true;
                    temperatureLabel.classList.add('disabled-label');
                    pressureLabel.classList.add('disabled-label');
                    document.getElementById('process-info').textContent = "等温过程 - 温度不变";
                    break;
                case 'adiabatic': // 绝热过程 - 无热量交换
                    temperatureSlider.disabled = true;
                    pressureSlider.disabled = true;
                    temperatureLabel.classList.add('disabled-label');
                    pressureLabel.classList.add('disabled-label');
                    document.getElementById('process-info').textContent = "绝热过程 - 无热量交换";
                    break;
            }
        }
        
        function updateFromSlider() {
            // 从滑块获取新值
            V = parseFloat(document.getElementById('volume-slider').value);
            P = parseFloat(document.getElementById('pressure-slider').value);
            T = parseFloat(document.getElementById('temperature-slider').value);
            
            // 更新显示值
            document.getElementById('volume-value').textContent = V.toFixed(1) + " L";
            document.getElementById('pressure-value').textContent = P + " kPa";
            document.getElementById('temperature-value').textContent = T + " K";
            
            // 更新系统
            updateSystem();
        }
        
        function updateSystem() {
            // 根据当前过程类型计算状态变化
            switch(currentProcess) {
                case 'isochoric': // 等容过程
                    calculateIsochoric();
                    break;
                case 'isobaric': // 等压过程
                    calculateIsobaric();
                    break;
                case 'isothermal': // 等温过程
                    calculateIsothermal();
                    break;
                case 'adiabatic': // 绝热过程
                    calculateAdiabatic();
                    break;
            }
            
            // 更新数据显示
            updateDataDisplay();
        }
        
        function calculateIsochoric() {
            // 等容过程: V不变，W=0，ΔE = Q
            W = 0;
            
            // 根据理想气体定律计算温度
            T = (P * V) / (n * R);
            
            // 计算内能变化
            ΔE = n * Cv * (T - 300); // 相对于初始温度300K
            
            // 热量等于内能变化
            Q = ΔE;
            
            // 更新滑块值
            updateSliders();
        }
        
        function calculateIsobaric() {
            // 等压过程: P不变，ΔE = Q - W
            
            // 根据理想气体定律计算温度
            T = (P * V) / (n * R);
            
            // 计算功 W = PΔV (相对于初始体积1.0L)
            W = P * (V - 1.0) * 100; // 转换为J
            
            // 计算内能变化
            ΔE = n * Cv * (T - 300);
            
            // 计算热量 Q = ΔE + W
            Q = ΔE + W;
            
            // 更新滑块值
            updateSliders();
        }
        
        function calculateIsothermal() {
            // 等温过程: T不变，ΔE=0，Q = W
            
            // 根据理想气体定律计算压强
            P = (n * R * T) / V;
            
            // 内能变化为零
            ΔE = 0;
            
            // 计算功 W = nRT ln(V/V0)
            W = n * R * T * Math.log(V / 1.0);
            
            // 热量等于功
            Q = W;
            
            // 更新滑块值
            updateSliders();
        }
        
        function calculateAdiabatic() {
            // 绝热过程: Q=0，ΔE = -W
            Q = 0;
            
            // 绝热指数
            const gamma = 5/3; // 单原子气体
            
            // 根据绝热过程方程计算温度
            T = 300 * Math.pow(V, 1-gamma); // 相对于初始状态
            
            // 根据理想气体定律计算压强
            P = (n * R * T) / V;
            
            // 计算内能变化
            ΔE = n * Cv * (T - 300);
            
            // 功等于负的内能变化
            W = -ΔE;
            
            // 更新滑块值
            updateSliders();
        }
        
        function updateSliders() {
            // 更新滑块位置但不触发事件
            document.getElementById('volume-slider').value = V;
            document.getElementById('pressure-slider').value = P;
            document.getElementById('temperature-slider').value = T;
            
            // 更新显示值
            document.getElementById('volume-value').textContent = V.toFixed(1) + " L";
            document.getElementById('pressure-value').textContent = P.toFixed(0) + " kPa";
            document.getElementById('temperature-value').textContent = T.toFixed(0) + " K";
        }
        
        function updateDataDisplay() {
            // 更新能量数据显示
            document.getElementById('q-value').textContent = Q.toFixed(1) + " J";
            document.getElementById('w-value').textContent = W.toFixed(1) + " J";
            document.getElementById('e-value').textContent = ΔE.toFixed(1) + " J";
        }
    </script>
</body>
</html>

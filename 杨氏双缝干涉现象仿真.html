<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杨氏双缝干涉现象仿真</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <style>
    body {
      background-color: #1a202c;
      color: #e2e8f0;
    }
    .light-path {
      stroke-dasharray: 4;
      animation: dash 1.5s linear infinite;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: 16;
      }
    }
    .slit {
      background: white;
      width: 2px;
      height: 8px;
    }
    .single-slit {
      background: white;
      width: 2px;
      height: 12px;
    }
    .slit-container {
      position: relative;
      background-color: #2d3748;
      border-radius: 2px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .screen {
      background-color: #000;
      border-radius: 4px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .light-source {
      background: radial-gradient(circle, #fbbf24 0%, #f59e0b 70%);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.7);
    }
    .control-panel {
      background-color: #2d3748;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .experiment-area {
      background-color: #1f2937;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .fringe {
      position: absolute;
      height: 10px;
      opacity: 0.95;
      left: 0;
    }
    .interference-label {
      position: absolute;
      left: 0;
      background-color: rgba(45, 55, 72, 0.8);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 10px;
      color: #e2e8f0;
    }
  </style>
</head>
<body class="bg-gray-900">
  <header class="bg-gray-800 shadow-md py-4">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center">
      <!-- 主标题 -->
      <h1 class="text-2xl font-bold flex items-center text-white">
        <i class="fa fa-lightbulb-o text-yellow-400 mr-2"></i>杨氏双缝干涉现象仿真
      </h1>
     <!-- 副标题 -->
      <div class="text-gray-300 text-sm">
        作者：xatu_bai
      </div>
    </div>
</div>
  </header>

  <main class="container mx-auto px-4 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- 控制面板 -->
      <div class="control-panel p-5">
        <h2 class="text-xl font-semibold mb-4 text-white">实验参数</h2>
        
        <div class="space-y-6">
          <!-- 波长控制 -->
          <div>
            <div class="flex justify-between mb-1">
              <label class="font-medium text-gray-300">光的波长 (λ)</label>
              <span id="wavelengthValue" class="text-yellow-400">550 nm</span>
            </div>
            <input type="range" id="wavelength" min="400" max="700" value="550" 
                  class="w-full h-2 bg-gray-700 rounded-lg">
            <div class="flex justify-between text-xs text-gray-400 mt-1">
              <span>400 nm (紫)</span>
              <span>700 nm (红)</span>
            </div>
          </div>
          
          <!-- 双缝间距控制 -->
          <div>
            <div class="flex justify-between mb-1">
              <label class="font-medium text-gray-300">双缝间距 (d)</label>
              <span id="slitDistanceValue" class="text-yellow-400">0.5 mm</span>
            </div>
            <input type="range" id="slitDistance" min="0.1" max="3" step="0.05" value="0.5"
                  class="w-full h-2 bg-gray-700 rounded-lg">
            <div class="flex justify-between text-xs text-gray-400 mt-1">
              <span>0.1 mm</span>
              <span>2 mm</span>
            </div>
          </div>
          
          <!-- 缝到屏距离控制 -->
          <div>
            <div class="flex justify-between mb-1">
              <label class="font-medium text-gray-300">缝到屏距离 (L)</label>
              <span id="screenDistanceValue" class="text-yellow-400">1.0 m</span>
            </div>
            <input type="range" id="screenDistance" min="0.5" max="3" step="0.1" value="1.0"
                  class="w-full h-2 bg-gray-700 rounded-lg">
            <div class="flex justify-between text-xs text-gray-400 mt-1">
              <span>0.5 m</span>
              <span>3 m</span>
            </div>
          </div>
          
          <!-- 光源类型 -->
          <div>
            <label class="block font-medium mb-2 text-gray-300">光源类型</label>
            <div class="grid grid-cols-2 gap-2">
              <button id="monoChromeBtn" class="bg-blue-600 text-white py-2 rounded">单色光</button>
              <button id="whiteLightBtn" class="bg-gray-700 text-gray-300 py-2 rounded">白光</button>
            </div>
          </div>
          
          <!-- 显示选项 -->
          <div>
            <label class="flex items-center space-x-2">
              <input type="checkbox" id="showInterferenceOrder" class="rounded text-blue-600" checked>
              <span class="font-medium text-gray-300">显示干涉级</span>
            </label>
          </div>
          <div>
  <label class="flex items-center space-x-2">
    <input type="checkbox" id="showFringeCoordinates" class="rounded text-blue-600">
    <span class="font-medium text-gray-300">显示亮纹坐标</span>
  </label>
</div>
          <!-- 公式说明 -->
          <div class="p-3 bg-gray-700 rounded border border-gray-600 mt-4">
            <h3 class="text-sm font-medium mb-2 text-gray-300">干涉条纹公式</h3>
           <div class="text-center text-sm text-gray-300">
                 条纹间距：Δy = (λL) / d = 
                <span id="fringeSpacingResult" class="text-yellow-400">1.10 mm</span>
            </div>
            <div class="text-center text-sm mt-1 text-gray-300">明纹位置：y = m(λL) / d</div>
          </div>
        </div>
      </div>
      
      <!-- 实验区 -->
      <div class="lg:col-span-2 space-y-6">
        <!-- 实验装置 -->
        <div class="experiment-area p-5">
          <h2 class="text-xl font-semibold mb-4 text-white">实验装置与干涉条纹</h2>
          <div id="experimentSetup" class="w-full h-[650px] relative">
            <!-- 实验台面 -->
            <div class="absolute bottom-0 left-0 right-0 h-16 bg-gray-800 border-t border-gray-700"></div>
            
            <!-- 中央轴线 -->
            <div class="absolute left-0 right-0 top-1/2 h-0.5 bg-gray-600 -translate-y-1/2"></div>
            
            <!-- 光源 -->
            <div class="light-source absolute left-[5%] top-1/2 w-16 h-16 rounded-full flex items-center justify-center -translate-y-1/2 z-10">
              <i class="fa fa-lightbulb-o text-yellow-800 text-xl"></i>
            </div>
            <div class="absolute left-[5%] top-[20%] text-sm font-medium text-gray-300">光源</div>
            
            <!-- 单缝装置 -->
            <div class="absolute left-[20%] top-1/2 slit-container -translate-y-1/2 z-10" style="width: 4px; height: 80px;">
              <!-- 单缝 -->
              <div class="single-slit absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2"></div>
            </div>
            <div class="absolute left-[20%] top-[20%] text-sm font-medium text-gray-300">单缝</div>
            
            <!-- 双缝装置 -->
            <div class="absolute left-[40%] top-1/2 slit-container -translate-y-1/2 z-10" style="width: 4px; height: 120px;">
              <!-- 上缝 -->
              <div id="slit1" class="slit absolute left-1/2 -translate-x-1/2" style="top: 40%;"></div>
              <!-- 下缝 -->
              <div id="slit2" class="slit absolute left-1/2 -translate-x-1/2" style="top: 60%;"></div>
            </div>
            <div class="absolute left-[40%] top-[20%] text-sm font-medium text-gray-300">双缝</div>
            
            <!-- 光路图 -->
            <svg id="lightPaths" class="absolute inset-0 w-full h-full pointer-events-none"></svg>
            
            <!-- 屏幕（显示干涉条纹） -->
            <div class="screen absolute right-[10%] top-1/2 w-32 h-[520px] -translate-y-1/2 z-10 overflow-hidden">
              <div id="screenContainer" class="w-full h-full relative">
                <!-- 干涉条纹和干涉级标签将在这里生成 -->
              </div>
            </div>
            <div class="absolute right-[10%] top-[20%] text-sm font-medium text-gray-300">屏幕</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // 全局变量
    let isWhiteLight = false;
    let showInterferenceOrder = true;
    let showFringeCoordinates = false; // 新增变量
    // DOM元素
    const wavelengthSlider = document.getElementById('wavelength');
    const wavelengthValue = document.getElementById('wavelengthValue');
    const slitDistanceSlider = document.getElementById('slitDistance');
    const slitDistanceValue = document.getElementById('slitDistanceValue');
    const screenDistanceSlider = document.getElementById('screenDistance');
    const screenDistanceValue = document.getElementById('screenDistanceValue');
    const monoChromeBtn = document.getElementById('monoChromeBtn');
    const whiteLightBtn = document.getElementById('whiteLightBtn');
    const showInterferenceOrderCheckbox = document.getElementById('showInterferenceOrder');
    const screenContainer = document.getElementById('screenContainer');
    const slit1 = document.getElementById('slit1');
    const slit2 = document.getElementById('slit2');
    const lightPaths = document.getElementById('lightPaths');
    const experimentSetup = document.getElementById('experimentSetup');
    const showFringeCoordinatesCheckbox = document.getElementById('showFringeCoordinates');
    // 绘制等间距平行条纹
    function updateInterferencePattern() {
      const lambda = parseFloat(wavelengthSlider.value); // nm
      const d = parseFloat(slitDistanceSlider.value); // mm
      const L = parseFloat(screenDistanceSlider.value); // m
       // 计算条纹间距（实际物理值）
  const fringeSpacingPhysical = (lambda * 1e-6 * L) / (d * 1e-3); // 单位：mm
  
  // 更新条纹间距显示
  document.getElementById('fringeSpacingResult').textContent = 
    fringeSpacingPhysical.toFixed(2) + ' mm';
  
      // 清空屏幕
      screenContainer.innerHTML = '';
      
      // 计算条纹间距（严格遵循Δy = λL/d公式）
      const fringeSpacing = (lambda * 1e-6 * L / (d * 1e-3)) * 400;
      const patternHeight = screenContainer.offsetHeight;
      const centerY = patternHeight / 2;
      
      // 计算可显示的条纹数量
      const maxFringes = Math.floor(centerY / fringeSpacing) + 5;
      const fringePositions = [];
      
      // 单色光模式
      if (!isWhiteLight) {
        const color = wavelengthToColor(lambda);
        
        // 绘制暗纹（背景）
        screenContainer.style.backgroundColor = 'black';
        
        // 绘制明纹（等间距平行条纹）
        for (let m = -maxFringes; m <= maxFringes; m++) {
          const yPos = centerY + m * fringeSpacing;
          
          // 确保条纹在屏幕范围内
          if (yPos > 0 && yPos < patternHeight) {
            const fringe = document.createElement('div');
            fringe.className = 'fringe';
            fringe.style.height = '10px';
            fringe.style.top = `${yPos - 5}px`;
            fringe.style.width = '100%';
            fringe.style.backgroundColor = color;
            screenContainer.appendChild(fringe);
            
            // 添加干涉级标签
            if (showInterferenceOrder) {
              const orderLabel = document.createElement('div');
              orderLabel.className = 'interference-label';
              orderLabel.textContent = `m=${m}`;
              orderLabel.style.top = `${yPos - 10}px`;
              screenContainer.appendChild(orderLabel);
            }
             // 添加亮纹坐标标签
    if (showFringeCoordinates) {
      const coordinateLabel = document.createElement('div');
      coordinateLabel.className = 'absolute right-0 text-xs text-gray-300 bg-gray-800 px-1 rounded';
        coordinateLabel.style.right = '0px'; // 距离屏幕容器右侧5px
  coordinateLabel.style.top = `${yPos - 10}px`;
      // 计算实际的y坐标值（单位：mm）
      // 根据条纹位置计算实际物理坐标
      const actualY = (m * lambda * 1e-6 * L) / (d * 1e-3);
      
      coordinateLabel.textContent = `y=${actualY.toFixed(2)}mm`;
      coordinateLabel.style.top = `${yPos - 10}px`;
      screenContainer.appendChild(coordinateLabel);
    }
    
            fringePositions.push({
              y: yPos,
              m: m
            });
          }
        }
      } 
      // 白光模式
      else {
        // 背景为黑色
        screenContainer.style.backgroundColor = 'black';
        
        // 中央白色明纹
        const centerFringe = document.createElement('div');
        centerFringe.className = 'fringe';
        centerFringe.style.height = '10px';
        centerFringe.style.top = `${centerY - 5}px`;
        centerFringe.style.width = '100%';
        centerFringe.style.backgroundColor = 'white';
        screenContainer.appendChild(centerFringe);
        fringePositions.push({
          y: centerY,
          m: 0
        });
        
        // 添加中央干涉级标签
        if (showInterferenceOrder) {
          const centerLabel = document.createElement('div');
          centerLabel.className = 'interference-label';
          centerLabel.textContent = 'm=0';
          centerLabel.style.top = `${centerY - 10}px`;
          screenContainer.appendChild(centerLabel);
        }
        
        // 两侧彩色条纹
        const wavelengths = [400, 450, 500, 550, 600, 650, 700];
        const colors = ['violet', 'blue', 'cyan', 'green', 'yellow', 'orange', 'red'];
        
        wavelengths.forEach((w, idx) => {
          const color = colors[idx];
          const wFringeSpacing = (w * 1e-6 * L / (d * 1e-3)) * 400;
          
          // 绘制正负方向条纹
          for (let m = 1; m <= 3; m++) {
            // 正方向条纹
            const yPos = centerY + m * wFringeSpacing;
            if (yPos < patternHeight) {
              const fringe = document.createElement('div');
              fringe.className = 'fringe';
              fringe.style.height = '8px';
              fringe.style.top = `${yPos - 4}px`;
              fringe.style.width = '100%';
              fringe.style.backgroundColor = color;
              fringe.style.opacity = 0.8;
              screenContainer.appendChild(fringe);
              
              // 添加干涉级标签
              if (showInterferenceOrder) {
                const orderLabel = document.createElement('div');
                orderLabel.className = 'interference-label';
                orderLabel.textContent = `m=${m}`;
                orderLabel.style.top = `${yPos - 10}px`;
                screenContainer.appendChild(orderLabel);
              }
              
              fringePositions.push({
                y: yPos,
                m: m
              });
            }
            
            // 负方向条纹
            const yNegPos = centerY - m * wFringeSpacing;
            if (yNegPos > 0) {
              const fringe = document.createElement('div');
              fringe.className = 'fringe';
              fringe.style.height = '8px';
              fringe.style.top = `${yNegPos - 4}px`;
              fringe.style.width = '100%';
              fringe.style.backgroundColor = color;
              fringe.style.opacity = 0.8;
              screenContainer.appendChild(fringe);
              
              // 添加干涉级标签
              if (showInterferenceOrder) {
                const orderLabel = document.createElement('div');
                orderLabel.className = 'interference-label';
                orderLabel.textContent = `m=${-m}`;
                orderLabel.style.top = `${yNegPos - 10}px`;
                screenContainer.appendChild(orderLabel);
              }
              
              fringePositions.push({
                y: yNegPos,
                m: -m
              });
            }
          }
        });
      }
      
      // 绘制光路
      drawLightPaths(fringePositions);
      
      // 更新双缝间距显示
      updateSlitDistance();
    }
    
    // 绘制光路 - 修复版：光线的出发点跟随缝的位置移动
    function drawLightPaths(fringePositions) {
      while (lightPaths.firstChild) lightPaths.removeChild(lightPaths.firstChild);
      
      const rect = experimentSetup.getBoundingClientRect();
      const svgWidth = rect.width;
      const svgHeight = rect.height;
      
      lightPaths.setAttribute('width', svgWidth);
      lightPaths.setAttribute('height', svgHeight);
      
      // 定义箭头标记
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
      marker.setAttribute('id', 'arrowhead');
      marker.setAttribute('markerWidth', '10');
      marker.setAttribute('markerHeight', '7');
      marker.setAttribute('refX', '9');
      marker.setAttribute('refY', '3.5');
      marker.setAttribute('orient', 'auto');
      
      const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      polygon.setAttribute('points', '0 0, 10 3.5, 0 7');
      polygon.setAttribute('fill', 'currentColor');
      
      marker.appendChild(polygon);
      defs.appendChild(marker);
      lightPaths.appendChild(defs);
      
      // 光源、单缝、双缝、屏幕位置
      const sourceX = svgWidth * 0.05;
      const sourceY = svgHeight * 0.5;
      const singleSlitX = svgWidth * 0.2;
      const singleSlitY = svgHeight * 0.5;
      const slitX = svgWidth * 0.4;
      const screenX = svgWidth * 0.9;
      const screenTopY = svgHeight * 0.5 - 260;
      const screenBottomY = svgHeight * 0.5 + 260;
      
      // 获取缝的实际位置 - 修复关键点
      const slit1Rect = slit1.getBoundingClientRect();
      const slit2Rect = slit2.getBoundingClientRect();
      const experimentRect = experimentSetup.getBoundingClientRect();
      
      // 计算缝在SVG中的实际位置
      const slit1Y = slit1Rect.top - experimentRect.top + slit1Rect.height / 2;
      const slit2Y = slit2Rect.top - experimentRect.top + slit2Rect.height / 2;
      
      // 光源到单缝的光线
      const drawLine = (x1, y1, x2, y2, color) => {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', color);
        line.setAttribute('stroke-width', '2');
        line.setAttribute('marker-end', 'url(#arrowhead)');
        lightPaths.appendChild(line);
      };
      
      // 光源到单缝
      const sourceColor = isWhiteLight ? 'rgba(255, 255, 255, 0.8)' : 'rgba(255, 220, 0, 0.8)';
      drawLine(sourceX + 8, sourceY, singleSlitX - 2, singleSlitY, sourceColor);
      
      // 单缝到双缝的光线 - 指向缝的中点
      drawLine(singleSlitX + 2, singleSlitY, slitX - 2, slit1Y, sourceColor);
      drawLine(singleSlitX + 2, singleSlitY, slitX - 2, slit2Y, sourceColor);
      
      // 双缝到条纹的光线 - 确保精确会聚到条纹右侧边缘
      fringePositions.forEach(pos => {
        const screenPosY = screenTopY + (pos.y / screenContainer.offsetHeight) * (screenBottomY - screenTopY);
        const color = isWhiteLight ? 'rgba(255, 255, 255, 0.8)' : wavelengthToColor(parseFloat(wavelengthSlider.value));
        
        // 确保两条光线精确会聚到条纹右侧边缘（屏幕右侧）
        drawLine(slitX + 2, slit1Y, screenX - 130, screenPosY, color);
        drawLine(slitX + 2, slit2Y, screenX - 130, screenPosY, color);
      });
    }
    
    // 波长转颜色
    function wavelengthToColor(wavelength) {
       let r, g, b;
  
  if (wavelength < 440) {
    // 400-440nm：紫色到蓝色
    r = (440 - wavelength) / 40;
    g = 0;
    b = 1;
  } else if (wavelength < 490) {
    // 440-490nm：蓝色到青色
    r = 0;
    g = (wavelength - 440) / 50;
    b = 1;
  } else if (wavelength < 510) {
    // 490-510nm：青色
    r = 0;
    g = 1;
    b = (510 - wavelength) / 20;
  } else if (wavelength < 580) {
    // 510-580nm：绿色到黄色
    r = (wavelength - 510) / 70;
    g = 1;
    b = 0;
  } else if (wavelength < 645) {
    // 580-645nm：黄色到橙色到红色
    r = 1;
    g = (645 - wavelength) / 65;
    b = 0;
  } else {
    // 645-700nm：红色
    r = 1;
    g = 0;
    b = 0;
  }
  
  // 调整强度，使颜色更鲜艳
  const factor = 0.8;
  r = Math.round(r * 255 * factor);
  g = Math.round(g * 255 * factor);
  b = Math.round(b * 255 * factor);
  
  return `rgb(${r}, ${g}, ${b})`;
}

    // 更新双缝间距显示 - 缝间距越大，两条白线距离越大
    function updateSlitDistance() {
      const d = parseFloat(slitDistanceSlider.value);
      // 缝间距越大，两条白线距离越大
      const gap = 10 + d * 20;
      slit1.style.top = `${(50 - gap/2)}%`;
      slit2.style.top = `${(50 + gap/2)}%`;
    }
    
    // 事件监听
    showFringeCoordinatesCheckbox.addEventListener('change', () => {
  showFringeCoordinates = showFringeCoordinatesCheckbox.checked;
  updateInterferencePattern();
});

wavelengthSlider.addEventListener('input', () => {
      wavelengthValue.textContent = `${wavelengthSlider.value} nm`;
      updateInterferencePattern();
    });
    
    slitDistanceSlider.addEventListener('input', () => {
      slitDistanceValue.textContent = `${slitDistanceSlider.value} mm`;
      updateInterferencePattern();
    });
    
    screenDistanceSlider.addEventListener('input', () => {
      screenDistanceValue.textContent = `${screenDistanceSlider.value} m`;
      updateInterferencePattern();
    });
    
    monoChromeBtn.addEventListener('click', () => {
      isWhiteLight = false;
      monoChromeBtn.classList.add('bg-blue-600', 'text-white');
      monoChromeBtn.classList.remove('bg-gray-700', 'text-gray-300');
      whiteLightBtn.classList.add('bg-gray-700', 'text-gray-300');
      whiteLightBtn.classList.remove('bg-blue-600', 'text-white');
      updateInterferencePattern();
    });
    
    whiteLightBtn.addEventListener('click', () => {
      isWhiteLight = true;
      whiteLightBtn.classList.add('bg-blue-600', 'text-white');
      whiteLightBtn.classList.remove('bg-gray-700', 'text-gray-300');
      monoChromeBtn.classList.add('bg-gray-700', 'text-gray-300');
      monoChromeBtn.classList.remove('bg-blue-600', 'text-white');
      updateInterferencePattern();
    });
    
    showInterferenceOrderCheckbox.addEventListener('change', () => {
      showInterferenceOrder = showInterferenceOrderCheckbox.checked;
      updateInterferencePattern();
    });
    
    // 初始化
    window.addEventListener('load', () => {
      updateInterferencePattern();
    });
    
    // 响应窗口大小变化
    window.addEventListener('resize', () => {
      updateInterferencePattern();
    });
  </script>
</body>
</html>

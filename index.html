<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学物理虚拟仿真实践项目库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        
        :root {
            --mechanics: #4a6ee0;
            --thermodynamics: #e74c3c;
            --electromagnetism: #9b59b6;
            --optics: #f39c12;
            --modern: #2ecc71;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --border: #eaeaea;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        header {
            background: var(--dark);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .creator {
            position: absolute;
            right: 30px;
            top: 30px;
            font-size: 1rem;
            opacity: 0.8;
        }
        
        .categories {
            display: flex;
            background: var(--light);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        
        .category-btn {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            background: var(--light);
            position: relative;
            overflow: hidden;
        }
        
        .category-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0;
            transition: height 0.3s ease;
            z-index: 1;
        }
        
        .category-btn span {
            position: relative;
            z-index: 2;
        }
        
        .category-btn.mechanics { 
            color: var(--mechanics); 
            border-bottom: 4px solid var(--mechanics); 
        }
        .category-btn.thermodynamics { 
            color: var(--thermodynamics); 
            border-bottom: 4px solid var(--thermodynamics); 
        }
        .category-btn.electromagnetism { 
            color: var(--electromagnetism); 
            border-bottom: 4px solid var(--electromagnetism); 
        }
        .category-btn.optics { 
            color: var(--optics); 
            border-bottom: 4px solid var(--optics); 
        }
        .category-btn.modern { 
            color: var(--modern); 
            border-bottom: 4px solid var(--modern); 
        }
        
        .category-btn.active.mechanics::before {
            height: 100%;
            background-color: var(--mechanics);
        }
        .category-btn.active.thermodynamics::before {
            height: 100%;
            background-color: var(--thermodynamics);
        }
        .category-btn.active.electromagnetism::before {
            height: 100%;
            background-color: var(--electromagnetism);
        }
        .category-btn.active.optics::before {
            height: 100%;
            background-color: var(--optics);
        }
        .category-btn.active.modern::before {
            height: 100%;
            background-color: var(--modern);
        }
        
        .category-btn.active {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .content-area {
            padding: 30px;
            min-height: 600px;
        }
        
        .subcategories {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }
        
        .subcategory-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            color: var(--gray);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .subcategory-btn:hover, .subcategory-btn.active {
            color: var(--dark);
            border-bottom: 3px solid var(--mechanics);
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .project-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .project-card:hover {
            transform: translateY(-7px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .card-category {
            font-size: 0.9rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .purpose-section, .content-section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: "•";
            margin-right: 8px;
            font-size: 1.5rem;
        }
        
        .purpose-section .section-title { color: var(--mechanics); }
        .content-section .section-title { color: var(--electromagnetism); }
        
        .section-content {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
        }
        
        .card-footer {
            padding: 15px 20px;
            background: var(--light);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .simulation-btn {
            padding: 10px 20px;
            background: var(--mechanics);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
        }
        
        .simulation-btn:hover {
            background: var(--dark);
        }
        
        .difficulty {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: #e9ecef;
            color: var(--gray);
        }
        
        .difficulty.beginner { background: #d4edda; color: #155724; }
        .difficulty.intermediate { background: #fff3cd; color: #856404; }
        .difficulty.advanced { background: #f8d7da; color: #721c24; }
        
        .category-content {
            display: none;
        }
        
        .category-content.active {
            display: block;
        }
        
        .subcategory-content {
            display: none;
        }
        
        .subcategory-content.active {
            display: block;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .categories {
                flex-direction: column;
            }
            
            .category-btn {
                min-width: 100%;
            }
            
            .creator {
                position: static;
                text-align: center;
                margin-top: 10px;
            }
            
            .subcategories {
                flex-direction: column;
            }
            
            .subcategory-btn {
                text-align: center;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 渲染所有分类的项目
            renderAllProjects();
            
            // 设置主分类切换
            setupCategorySwitching();
            
            // 设置子分类切换
            setupSubcategorySwitching();
        });

        // 渲染所有分类的项目
        function renderAllProjects() {
            for (const category in physicsProjects) {
                for (const subcategory in physicsProjects[category]) {
                    renderProjects(category, subcategory, physicsProjects[category][subcategory]);
                }
            }
        }

        // 渲染指定分类和子分类的项目
        function renderProjects(category, subcategory, projects) {
            const container = document.getElementById(`${category}-${subcategory}-projects`);
            if (!container) return;
            
            container.innerHTML = '';
            
            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔬</div>
                        <h3>暂无${getCategoryName(category)}${getSubcategoryName(subcategory)}项目</h3>
                        <p>该分类下的仿真项目正在开发中，敬请期待</p>
                    </div>
                `;
                return;
            }
            
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${project.title}</div>
                        <div class="card-category">${getCategoryName(category)} · ${getSubcategoryName(subcategory)} · ${project.knowledgePoints.join('、')}</div>
                    </div>
                    <div class="card-body">
                        <div class="purpose-section">
                            <div class="section-title">实践目的</div>
                            <div class="section-content">${project.purpose}</div>
                        </div>
                        <div class="content-section">
                            <div class="section-title">实践内容</div>
                            <div class="section-content">${project.content}</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="${project.geogebraUrl}" target="_blank" class="simulation-btn">开始实验</a>
                        <div class="difficulty ${project.difficulty}">${getDifficultyText(project.difficulty)}</div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // 设置主分类切换
        function setupCategorySwitching() {
            const categoryButtons = document.querySelectorAll('.category-btn');
            const categoryContents = document.querySelectorAll('.category-content');
            
            categoryButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // 更新活跃按钮
                    categoryButtons.forEach(btn => {
                        btn.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    // 更新显示内容
                    const category = this.getAttribute('data-category');
                    categoryContents.forEach(content => {
                        content.classList.remove('active');
                    });
                    document.getElementById(`${category}-content`).classList.add('active');
                    
                    // 重置子分类为第一个
                    const subcategoryBtns = document.querySelectorAll(`#${category}-content .subcategory-btn`);
                    const subcategoryContents = document.querySelectorAll(`#${category}-content .subcategory-content`);
                    
                    if (subcategoryBtns.length > 0) {
                        subcategoryBtns.forEach(btn => btn.classList.remove('active'));
                        subcategoryContents.forEach(content => content.classList.remove('active'));
                        
                        subcategoryBtns[0].classList.add('active');
                        subcategoryContents[0].classList.add('active');
                    }
                });
            });
        }

        // 设置子分类切换
        function setupSubcategorySwitching() {
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('subcategory-btn')) {
                    const subcategoryBtn = e.target;
                    const categoryContent = subcategoryBtn.closest('.category-content');
                    const subcategory = subcategoryBtn.getAttribute('data-subcategory');
                    
                    // 更新活跃按钮
                    categoryContent.querySelectorAll('.subcategory-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    subcategoryBtn.classList.add('active');
                    
                    // 更新显示内容
                    categoryContent.querySelectorAll('.subcategory-content').forEach(content => {
                        content.classList.remove('active');
                    });
                    categoryContent.querySelector(`#${categoryContent.id.split('-')[0]}-${subcategory}`).classList.add('active');
                }
            });
        }

        // 获取分类名称
        function getCategoryName(category) {
            const names = {
                mechanics: '力学',
                thermodynamics: '热学',
                electromagnetism: '电磁学',
                optics: '光学',
                modern: '近代物理学'
            };
            return names[category] || category;
        }

        // 获取子分类名称
        function getSubcategoryName(subcategory) {
            const names = {
                phenomenon: '物理现象虚拟仿真',
                engineering: '工程应用虚拟仿真'
            };
            return names[subcategory] || subcategory;
        }

        // 获取难度文本
        function getDifficultyText(difficulty) {
            const texts = {
                beginner: '初级',
                intermediate: '中级',
                advanced: '高级'
            };
            return texts[difficulty] || difficulty;
        }
    </script>
</body>
</html>
